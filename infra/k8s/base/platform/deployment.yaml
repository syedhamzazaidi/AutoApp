apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform
  namespace: endian-platform
  labels:
    app.kubernetes.io/name: platform
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: platform-provisioner
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: platform
          image: endian/platform:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              value: production
            - name: SANDBOX_NAMESPACE
              value: endian-sandboxes
            - name: PREVIEW_DOMAIN
              value: PLACEHOLDER_PREVIEW_DOMAIN
            - name: SANDBOX_IMAGE
              value: endian/sandbox:latest
            - name: SANDBOX_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: SANDBOX_AUTH_SECRET
            - name: VITE_SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: VITE_SUPABASE_ANON_KEY
                  optional: true
            - name: VITE_SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: SUPABASE_URL
                  optional: true
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: DATABASE_URL
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: BETTER_AUTH_SECRET
            - name: BETTER_AUTH_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: BETTER_AUTH_URL
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: OPENROUTER_API_KEY
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: SUPABASE_URL
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: SUPABASE_SERVICE_ROLE_KEY
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
