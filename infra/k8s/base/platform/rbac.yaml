apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-provisioner
  namespace: endian-platform
  labels:
    app.kubernetes.io/name: platform
    app.kubernetes.io/component: provisioner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-provisioner
  namespace: endian-sandboxes
  labels:
    app.kubernetes.io/name: platform
    app.kubernetes.io/component: provisioner
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims", "secrets", "services", "pods"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: platform-provisioner
  namespace: endian-sandboxes
  labels:
    app.kubernetes.io/name: platform
    app.kubernetes.io/component: provisioner
subjects:
  - kind: ServiceAccount
    name: platform-provisioner
    namespace: endian-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sandbox-provisioner
