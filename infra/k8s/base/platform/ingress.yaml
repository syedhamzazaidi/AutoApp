apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform
  namespace: endian-platform
  labels:
    app.kubernetes.io/name: platform
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: PLACEHOLDER_PLATFORM_HOST
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: platform
                port:
                  number: 80
