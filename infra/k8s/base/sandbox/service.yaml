apiVersion: v1
kind: Service
metadata:
  name: {{SERVICE_NAME}}
  namespace: {{NAMESPACE}}
  labels:
    app.kubernetes.io/name: sandbox
    app.kubernetes.io/component: workspace
    endian.io/project-id: "{{PROJECT_ID}}"
spec:
  selector:
    app.kubernetes.io/name: sandbox
    endian.io/project-id: "{{PROJECT_ID}}"
  ports:
    - name: preview
      port: 5173
      targetPort: 5173
    - name: agent
      port: 3002
      targetPort: 3002
