# Reference template for per-project sandbox pods.
# The sandbox provisioner clones this spec and substitutes PROJECT_ID, image refs, and secrets.
# Do not apply directly — labels use placeholder values.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-PROJECT_ID
  namespace: endian-sandboxes
  labels:
    app.kubernetes.io/name: sandbox
    app.kubernetes.io/component: workspace
    endian.io/project-id: PROJECT_ID
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sandbox
      endian.io/project-id: PROJECT_ID
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sandbox
        app.kubernetes.io/component: workspace
        endian.io/project-id: PROJECT_ID
    spec:
      serviceAccountName: sandbox-runtime
      runtimeClassName: gvisor
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: seed-scaffold
          image: endian/sandbox:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c", "cp -a /seed/. /workspace/"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsUser: 1000
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: seed
              mountPath: /seed
              readOnly: true
      containers:
        - name: sandbox
          image: endian/sandbox:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: agent
              containerPort: 3002
            - name: preview
              containerPort: 5173
          envFrom:
            - secretRef:
                name: sandbox-PROJECT_ID
          readinessProbe:
            httpGet:
              path: /health
              port: agent
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: sandbox-PROJECT_ID
        - name: seed
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sandbox-PROJECT_ID
  namespace: endian-sandboxes
  labels:
    app.kubernetes.io/name: sandbox
    endian.io/project-id: PROJECT_ID
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sandbox
    endian.io/project-id: PROJECT_ID
  ports:
    - name: agent
      port: 3002
      targetPort: agent
    - name: preview
      port: 5173
      targetPort: preview
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sandbox-PROJECT_ID
  namespace: endian-sandboxes
  labels:
    app.kubernetes.io/name: sandbox
    endian.io/project-id: PROJECT_ID
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard-rwo
---
apiVersion: v1
kind: Secret
metadata:
  name: sandbox-PROJECT_ID
  namespace: endian-sandboxes
  labels:
    app.kubernetes.io/name: sandbox
    endian.io/project-id: PROJECT_ID
type: Opaque
stringData:
  VITE_PROJECT_ID: PROJECT_ID
  VITE_SUPABASE_URL: ""
  VITE_SUPABASE_ANON_KEY: ""
