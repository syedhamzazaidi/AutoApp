apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: endian-platform
type: Opaque
stringData:
  # DB password is NOT stored in git. Terraform writes it to Secret Manager as
  # `endian-platform-db-password`. After apply, run scripts/sync-platform-db-secret.sh
  # to patch DATABASE_URL in the cluster (URL-encodes password, unix socket host).
  DATABASE_URL: postgresql://endian:CHANGE_ME@/endian?host=/cloudsql/project-5be3cb47-0a28-4053-b3a:us-central1:endian-platform-prod
  BETTER_AUTH_SECRET: CHANGE_ME
  BETTER_AUTH_URL: https://platform.syedhamzazaidi.com
  GOOGLE_CLIENT_ID: CHANGE_ME
  GOOGLE_CLIENT_SECRET: CHANGE_ME
  OPENROUTER_API_KEY: CHANGE_ME
  SUPABASE_URL: CHANGE_ME
  SUPABASE_SERVICE_ROLE_KEY: CHANGE_ME
  SANDBOX_AUTH_SECRET: CHANGE_ME
  VITE_SUPABASE_ANON_KEY: CHANGE_ME
