apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform
  namespace: endian-platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - platform.syedhamzazaidi.com
      secretName: platform-tls
  rules:
    - host: platform.syedhamzazaidi.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: platform
                port:
                  number: 80
