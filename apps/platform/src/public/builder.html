<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Builder — AutoApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/builder.css" />
  </head>
  <body>
    <header class="builder-header">
      <a class="logo" href="/" aria-label="AutoApp home">
        <span class="logo-mark" aria-hidden="true">◆</span>
        AutoApp
      </a>
      <div class="profile-menu">
        <button
          id="profile-toggle"
          type="button"
          class="profile-avatar-btn"
          aria-haspopup="menu"
          aria-expanded="false"
          aria-controls="profile-dropdown"
        >
          <span id="profile-avatar" class="profile-avatar" aria-hidden="true"></span>
          <span class="visually-hidden">Account menu</span>
        </button>
        <div id="profile-dropdown" class="profile-dropdown" role="menu" hidden>
          <div class="profile-details">
            <span id="profile-name" class="profile-name"></span>
            <span id="profile-email" class="profile-email"></span>
          </div>
          <button id="sign-out" type="button" class="profile-sign-out btn btn-ghost btn-sm" role="menuitem">
            Sign out
          </button>
        </div>
      </div>
    </header>
    <div class="builder-url-bar" role="toolbar" aria-label="Preview controls">
      <button
        id="project-toggle"
        type="button"
        class="btn btn-ghost btn-sm url-bar-project"
        aria-expanded="false"
        aria-controls="project-panel"
      >
        Project
      </button>
      <div class="url-bar-nav">
        <button
          id="preview-back"
          type="button"
          class="btn btn-ghost btn-sm url-bar-nav-btn"
          aria-label="Go back"
          disabled
        >
          ←
        </button>
        <button
          id="preview-forward"
          type="button"
          class="btn btn-ghost btn-sm url-bar-nav-btn"
          aria-label="Go forward"
          disabled
        >
          →
        </button>
        <button
          id="preview-refresh"
          type="button"
          class="btn btn-ghost btn-sm url-bar-nav-btn"
          aria-label="Refresh preview"
        >
          ↻
        </button>
      </div>
      <div class="url-bar-field">
        <input
          id="preview-url"
          type="text"
          class="url-bar-input"
          readonly
          value="http://localhost:5173"
          aria-label="Preview URL"
        />
      </div>
    </div>
    <main class="builder-main">
      <div id="project-panel" class="project-panel" hidden>
        <div class="project-panel-header">
          <h2>Project</h2>
          <button
            id="project-close"
            type="button"
            class="btn btn-ghost btn-sm project-close"
            aria-label="Hide project"
          >
            ×
          </button>
        </div>
        <div class="file-tree">
          apps/scaffold/<br />
          ├── src/pages/<br />
          ├── src/services/<br />
          ├── src/features/<br />
          └── supabase/<br />
          &nbsp;&nbsp;&nbsp;&nbsp;├── migrations/<br />
          &nbsp;&nbsp;&nbsp;&nbsp;└── functions/
        </div>
      </div>
      <div class="preview-canvas">
        <iframe id="preview-iframe" src="http://localhost:5173" title="App preview"></iframe>
        <footer id="chat-bar" class="builder-chat-bar">
          <div id="messages" class="messages" aria-live="polite"></div>
          <div class="input-area">
            <button
              id="chat-toggle"
              type="button"
              class="btn btn-ghost btn-sm chat-toggle"
              aria-label="Toggle chat"
              aria-expanded="false"
              aria-controls="messages"
              hidden
            >
              <span class="chat-toggle-chevron" aria-hidden="true">▲</span>
            </button>
            <div class="prompt-wrap">
              <input id="prompt" type="text" placeholder="Add a plants page that lists my plants..." />
              <button id="send" type="button" class="prompt-send btn btn-ghost" aria-label="Send">
                <span class="prompt-send-icon" aria-hidden="true">→</span>
              </button>
            </div>
          </div>
        </footer>
      </div>
    </main>
    <script type="module" src="/builder.js"></script>
  </body>
</html>
