<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Builder — AutoApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/builder.css" />
  </head>
  <body>
    <header class="builder-header">
      <a class="logo" href="/" aria-label="AutoApp home">
        <span class="logo-mark" aria-hidden="true">◆</span>
        AutoApp
      </a>
      <div class="profile-menu">
        <button
          id="profile-toggle"
          type="button"
          class="profile-avatar-btn"
          aria-haspopup="menu"
          aria-expanded="false"
          aria-controls="profile-dropdown"
        >
          <span id="profile-avatar" class="profile-avatar" aria-hidden="true"></span>
          <span class="visually-hidden">Account menu</span>
        </button>
        <div id="profile-dropdown" class="profile-dropdown" role="menu" hidden>
          <div class="profile-details">
            <span id="profile-name" class="profile-name"></span>
            <span id="profile-email" class="profile-email"></span>
          </div>
          <button id="sign-out" type="button" class="profile-sign-out btn btn-ghost btn-sm" role="menuitem">
            Sign out
          </button>
        </div>
      </div>
    </header>
    <div class="builder-url-bar" role="toolbar" aria-label="Preview controls">
      <button
        id="project-toggle"
        type="button"
        class="btn btn-ghost btn-sm url-bar-project"
        aria-expanded="false"
        aria-controls="project-panel"
      >
        Project
      </button>
      <div class="url-bar-nav">
        <button
          id="preview-back"
          type="button"
          class="btn btn-ghost btn-sm url-bar-nav-btn"
          aria-label="Go back"
          disabled
        >
          ←
        </button>
        <button
          id="preview-forward"
          type="button"
          class="btn btn-ghost btn-sm url-bar-nav-btn"
          aria-label="Go forward"
          disabled
        >
          →
        </button>
        <button
          id="preview-refresh"
          type="button"
          class="btn btn-ghost btn-sm url-bar-nav-btn"
          aria-label="Refresh preview"
        >
          ↻
        </button>
      </div>
      <div class="url-bar-field">
        <input
          id="preview-url"
          type="text"
          class="url-bar-input"
          readonly
          value=""
          aria-label="Preview URL"
        />
      </div>
    </div>
    <main class="builder-main">
      <div id="project-panel" class="project-panel" hidden>
        <div class="project-panel-header">
          <h2>Projects</h2>
          <button
            id="project-close"
            type="button"
            class="btn btn-ghost btn-sm project-close"
            aria-label="Hide project"
          >
            ×
          </button>
        </div>
        <div id="project-status" class="project-status" role="status" hidden></div>
        <div class="project-actions">
          <button id="project-create" type="button" class="btn btn-ghost btn-sm">New project</button>
        </div>
        <ul id="project-list" class="project-list" aria-label="Your projects"></ul>
        <div id="project-details" class="project-details" hidden>
          <p><strong id="project-name"></strong></p>
          <p class="project-meta">Sandbox: <span id="project-sandbox-status">—</span></p>
        </div>
        <div class="file-tree" id="file-tree">
          Select or create a project to view workspace files.
        </div>
      </div>
      <div class="preview-canvas">
        <div
          id="preview-loading"
          class="preview-loading"
          hidden
          role="status"
          aria-live="polite"
          aria-busy="true"
        >
          <div class="preview-loading-orb" aria-hidden="true">
            <span class="preview-loading-ring"></span>
            <span class="preview-loading-ring"></span>
            <span class="preview-loading-ring"></span>
            <span class="preview-loading-core"></span>
          </div>
          <p class="preview-loading-label">Starting preview…</p>
          <p class="preview-loading-hint">Spinning up your workspace</p>
        </div>
        <iframe
          id="preview-iframe"
          src="about:blank"
          title="App preview"
          sandbox="allow-scripts allow-same-origin"
        ></iframe>
        <footer id="chat-bar" class="builder-chat-bar">
          <div id="messages" class="messages" aria-live="polite"></div>
          <div class="input-area">
            <button
              id="chat-toggle"
              type="button"
              class="btn btn-ghost btn-sm chat-toggle"
              aria-label="Toggle chat"
              aria-expanded="false"
              aria-controls="messages"
              hidden
            >
              <span class="chat-toggle-chevron" aria-hidden="true">▲</span>
            </button>
            <div class="prompt-wrap">
              <input id="prompt" type="text" placeholder="Add a plants page that lists my plants..." />
              <button id="send" type="button" class="prompt-send btn btn-ghost" aria-label="Send">
                <span class="prompt-send-icon" aria-hidden="true">→</span>
              </button>
            </div>
          </div>
        </footer>
      </div>
    </main>
    <div id="project-name-dialog" class="dialog-overlay" hidden>
      <div
        class="dialog-card"
        role="dialog"
        aria-labelledby="project-name-dialog-title"
        aria-modal="true"
      >
        <h2 id="project-name-dialog-title">New project</h2>
        <p class="dialog-subtitle">Give your project a name to get started.</p>
        <label class="dialog-field" for="project-name-input">
          <span class="dialog-label">Project name</span>
          <input id="project-name-input" type="text" class="dialog-input" value="My app" />
        </label>
        <div class="dialog-actions">
          <button id="project-name-cancel" type="button" class="btn btn-ghost btn-sm">Cancel</button>
          <button id="project-name-submit" type="button" class="btn btn-primary btn-sm">Create</button>
        </div>
      </div>
    </div>
    <script type="module" src="/builder.js"></script>
  </body>
</html>
