<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Builder — AutoApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/builder.css" />
  </head>
  <body>
    <header class="builder-header">
      <div class="profile-menu">
        <button
          id="profile-toggle"
          type="button"
          class="profile-avatar-btn"
          aria-haspopup="menu"
          aria-expanded="false"
          aria-controls="profile-dropdown"
        >
          <span id="profile-avatar" class="profile-avatar" aria-hidden="true"></span>
          <span class="visually-hidden">Account menu</span>
        </button>
        <div id="profile-dropdown" class="profile-dropdown" role="menu" hidden>
          <div class="profile-details">
            <span id="profile-name" class="profile-name"></span>
            <span id="profile-email" class="profile-email"></span>
          </div>
          <button id="sign-out" type="button" class="profile-sign-out btn btn-ghost btn-sm" role="menuitem">
            Sign out
          </button>
        </div>
      </div>
    </header>
    <main class="builder-main">
      <div id="project-panel" class="panel panel-tree" hidden>
        <h2>Project</h2>
        <div class="file-tree">
          apps/scaffold/<br />
          ├── src/pages/<br />
          ├── src/services/<br />
          ├── src/features/<br />
          └── supabase/<br />
          &nbsp;&nbsp;&nbsp;&nbsp;├── migrations/<br />
          &nbsp;&nbsp;&nbsp;&nbsp;└── functions/
        </div>
      </div>
      <div class="panel panel-preview">
        <div class="panel-header">
          <h2>Preview</h2>
          <button
            id="project-toggle"
            type="button"
            class="btn btn-ghost btn-sm project-toggle"
            aria-expanded="false"
            aria-controls="project-panel"
          >
            Project
          </button>
        </div>
        <iframe src="http://localhost:5173" title="App preview"></iframe>
      </div>
    </main>
    <footer id="chat-bar" class="builder-chat-bar">
      <div id="messages" class="messages" aria-live="polite"></div>
      <div class="input-area">
        <input id="prompt" type="text" placeholder="Add a plants page that lists my plants..." />
        <label class="plan-toggle">
          <input type="checkbox" id="planMode" />
          Plan mode
        </label>
        <button id="send" type="button" class="btn btn-primary btn-sm">Send</button>
      </div>
    </footer>
    <script type="module" src="/builder.js"></script>
  </body>
</html>
